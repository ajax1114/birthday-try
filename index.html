<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <title>Birthday Wish</title>
    <style>
      body {
        margin: 0;
        background-color: #feefe5;
        font-family: "Pixelify Sans", sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
      }

      #birthdayText {
        text-align: center;
        margin-bottom: 2rem;
      }

      #mainTitle {
        font-size: 2.5rem;
        color: #d1515a;
        margin-bottom: 0.5rem;
      }

      #subTitle {
        font-size: 1.2rem;
        color: #555;
      }

      #startBtn {
        font-family: 'Pixelify Sans', sans-serif;
        font-size: 1.1rem;
        padding: 10px 20px;
        background-color: #d1515a;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        box-shadow: 0 4px 0 #a03c43;
        transition: transform 0.1s;
      }

      #startBtn:active {
        transform: translateY(4px);
        box-shadow: none;
      }

      .canvas-container {
        position: relative;
        image-rendering: pixelated;
      }

      #cake {
        position: relative;
        background-color: #f7a399;
        border: 4px solid #3d262a;
        width: 350px;
        height: 200px;
        border-radius: 20px;
        box-shadow: 0 10px 0 #e57c74;
        cursor: pointer; /* Visually hints that the cake can be interacted with */
      }

      .candle {
        width: 14px;
        height: 50px;
        border: 3px solid #3d262a;
        position: absolute;
        border-radius: 4px 4px 0 0;
      }

      .candle::before {
        content: "";
        position: absolute;
        top: -15px;
        left: 4px;
        width: 6px;
        height: 15px;
        background-color: #ff9f1c;
        border-radius: 50% 50% 20% 20%;
        animation: flicker 0.1s infinite alternate;
      }

      .candle.blown::before {
        display: none;
      }

      @keyframes flicker {
        0% { transform: scale(1); }
        100% { transform: scale(1.1) rotate(2deg); }
      }

      .green-candle { background-color: #2ec4b6; }
      .purple-candle { background-color: #9b5de5; }
      .blue-candle { background-color: #00bbf9; }
      .yellow-candle { background-color: #ffee32; }
    </style>
  </head>
  <body>
    <div id="birthdayText">
      <div id="mainTitle">Loading...</div>
      <div id="subTitle"></div>
    </div>

    <div class="canvas-container">
      <div id="cake"></div>
    </div>

    <script>
      // Read URL params
      const params = new URLSearchParams(window.location.search);
      const name = params.get("name") || "Friend";
      let candleCount = parseInt(params.get("candles")) || 4;
      candleCount = Math.min(Math.max(candleCount, 1), 30);

      const birthdayText = document.getElementById("birthdayText");
      
      birthdayText.innerHTML = `
        <div id="mainTitle">Happy Birthday, ${name}!</div>
        <div id="subTitle" style="margin-top: 15px;">
          <button id="startBtn">Click to Light Candles & Enable Mic 🎂</button>
        </div>
      `;

      const cake = document.getElementById("cake");
      const colors = ["green-candle", "purple-candle", "blue-candle", "yellow-candle"];
      const CAKE_VISUAL_WIDTH = 35;

      function createCandles(count) {
        cake.innerHTML = "";
        const CANDLE_VISUAL_WIDTH = 2;
        const availableWidth = CAKE_VISUAL_WIDTH;
        const candlesPerRow = 6;
        const shiftAmount = 4;

        for (let i = 0; i < count; i++) {
          const candle = document.createElement("div");
          candle.classList.add("candle");
          const colorClass = colors[Math.floor(Math.random() * colors.length)];
          candle.classList.add(colorClass);

          const row = Math.floor(i / candlesPerRow);
          const col = i % candlesPerRow;
          const totalCandlesInRow = Math.min(candlesPerRow, count - row * candlesPerRow);
          const rowSpacing = availableWidth / (totalCandlesInRow + 1);

          const leftBase = rowSpacing * (col + 1) - CANDLE_VISUAL_WIDTH / 2 + 5;
          const rowShift = row % 2 === 0 ? 0 : shiftAmount;

          candle.style.position = "absolute";
          candle.style.top = `${10 + row * 18}px`; 
          candle.style.left = `${leftBase * 8 - rowShift * 4 + 40}px`; 

          cake.appendChild(candle);
        }
      }

      createCandles(candleCount);

      // Safe backup toggle
      let handlesBlowLocally = false;
      
      // Let users tap or click the cake as a manual option if their system blocks microphones
      cake.addEventListener("click", () => {
        if (!handlesBlowLocally) {
          handlesBlowLocally = true;
          blowOutCandles();
        }
      });

      document.getElementById("startBtn").addEventListener("click", () => {
        document.getElementById("subTitle").innerHTML = "<span style='color: #d1515a; font-weight: bold;'>Make a wish and blow hard into your mic! (Or tap the cake) 🌬️</span>";
        startMicDetection();
      });

      // === Microphone / Blow Detection ===
      async function startMicDetection() {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const source = audioContext.createMediaStreamSource(stream);
          const analyser = audioContext.createAnalyser();
          analyser.fftSize = 512;

          source.connect(analyser);
          const dataArray = new Uint8Array(analyser.frequencyBinCount);

          function detectBlow() {
            analyser.getByteFrequencyData(dataArray);

            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
              sum += dataArray[i];
            }
            const averageVolume = sum / dataArray.length;

            // Trigger blow event if sound intensity steps over standard ambiance rules
            if (averageVolume > 45 && !handlesBlowLocally) {
              handlesBlowLocally = true;
              blowOutCandles();
              stream.getTracks().forEach(track => track.stop());
              return; 
            }

            if (!handlesBlowLocally) {
              requestAnimationFrame(detectBlow);
            }
          }

          detectBlow();
        } catch (err) {
          console.error("Mic access error:", err);
          alert("Microphone stream could not connect. Ensure you are running this file via an HTTP Server environment (like Live Server) rather than double clicking a 'file:///' link! Fallback enabled: click the cake to blow out candles.");
        }
      }

      function blowOutCandles() {
        const candles = document.querySelectorAll(".candle");
        candles.forEach((candle) => {
          const delay = Math.random() * 800; 
          setTimeout(() => {
            candle.classList.add("blown");
          }, delay);
        });

        setTimeout(() => {
          const subTitle = document.getElementById("subTitle");
          subTitle.innerHTML = `<span style="font-size: 1.5rem; color: #2ec4b6; font-weight: bold;">Yayy! Wishing you the happiest birthday ever!! 🎉🍰</span>`;
        }, 1200);
      }
    </script>
  </body>
</html>
